name: ESP Watchdog (Upptime Triggered)

on:
  workflow_dispatch:

  issues:
    types: [opened]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send OFFLINE alert
        run: |
          NTFY_URL="${{ secrets.NTFY_URL }}"
          curl -d "🔴 ESP OFFLINE detected by Upptime" "$NTFY_URL"

      - name: Close issue (optional auto-clean)
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            await github.rest.issues.update({
              ...issue,
              state: "closed"
            });
