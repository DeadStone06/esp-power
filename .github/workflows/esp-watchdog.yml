name: ESP Watchdog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ESP status
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: |
          set +e

          URL="https://api.thingspeak.com/channels/3369305/feeds.json?results=1"

          echo "Fetching ThingSpeak..."

          # ---- RETRY LOGIC ----
          DATA=""
          for i in 1 2 3; do
            DATA=$(curl --silent --show-error --max-time 15 "$URL")
            
            if echo "$DATA" | jq . >/dev/null 2>&1; then
              echo "Valid JSON received"
              break
            fi

            echo "Attempt $i failed, retrying..."
            sleep 2
          done

          # ---- FINAL CHECK ----
          if ! echo "$DATA" | jq . >/dev/null 2>&1; then
            echo "ERROR: Invalid or empty response from ThingSpeak"
            exit 0
          fi

          # ---- PARSE ----
          LAST=$(echo "$DATA" | jq -r '.feeds[0].created_at')

          if [ "$LAST" = "null" ] || [ -z "$LAST" ]; then
            echo "No valid timestamp"
            exit 0
          fi

          LAST_TS=$(date -d "$LAST" +%s)
          NOW_TS=$(date +%s)

          DIFF=$((NOW_TS - LAST_TS))

          echo "Last update: $LAST"
          echo "Diff: $DIFF sec"

          STATE_FILE=".esp_state"

          if [ ! -f "$STATE_FILE" ]; then
            echo "online" > "$STATE_FILE"
          fi

          PREV=$(cat "$STATE_FILE")

          if [ "$DIFF" -gt 300 ]; then
            CURR="offline"
          else
            CURR="online"
          fi

          echo "Prev: $PREV"
          echo "Curr: $CURR"

          # ---- NOTIFY ONLY ON CHANGE ----
          if [ "$PREV" != "$CURR" ]; then

            if [ "$CURR" = "offline" ]; then
              curl --silent --max-time 10 \
                -H "Title: ESP Alert" \
                -d "🔴 ESP OFFLINE" \
                "$NTFY_URL"
            else
              curl --silent --max-time 10 \
                -H "Title: ESP Alert" \
                -d "🟢 ESP ONLINE" \
                "$NTFY_URL"
            fi

            echo "$CURR" > "$STATE_FILE"

            git config user.name "github-actions"
            git config user.email "actions@github.com"

            git add "$STATE_FILE"
            git commit -m "ESP state: $CURR" || true
            git push || true

          else
            echo "No state change"
          fi
