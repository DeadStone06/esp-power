name: ESP Watchdog

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest data from ThingSpeak
        id: fetch
        run: |
          URL="https://api.thingspeak.com/channels/3369305/feeds.json?results=1"
          RESPONSE=$(curl -s "$URL")

          echo "$RESPONSE" > response.json

          TIME=$(echo "$RESPONSE" | jq -r '.feeds[0].created_at')

          if [ -z "$TIME" ] || [ "$TIME" = "null" ]; then
            echo "NO_DATA"
            exit 0
          fi

          NOW=$(date -u +%s)
          LAST=$(date -d "$TIME" +%s)

          DIFF=$((NOW - LAST))

          echo "$DIFF" > diff.txt

      - name: Check state and send ntfy
        run: |
          DIFF=$(cat diff.txt)
          STATE_FILE="esp_state.txt"
          NTFY_URL="${{ secrets.NTFY_URL }}"

          STATE=$(cat $STATE_FILE 2>/dev/null || echo "UNKNOWN")

          echo "Diff = $DIFF"
          echo "State = $STATE"

          # OFFLINE condition
          if [ "$DIFF" -gt 120 ]; then
            if [ "$STATE" != "DOWN" ]; then
              echo "DOWN" > $STATE_FILE
              curl -d "🔴 ESP OFFLINE (no updates >120s)" "$NTFY_URL"
            fi
          else
            # ONLINE condition
            if [ "$STATE" = "DOWN" ]; then
              echo "OK" > $STATE_FILE
              curl -d "🟢 ESP ONLINE restored" "$NTFY_URL"
            else
              echo "OK" > $STATE_FILE
            fi
          fi

      - name: Save state to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add esp_state.txt || true
          git commit -m "update esp state" || exit 0
          git push || true
