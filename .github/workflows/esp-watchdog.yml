name: ESP Watchdog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run watchdog
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: |
          set +e

          URL="https://api.thingspeak.com/channels/3369305/feeds.json?results=1"

          echo "Fetching ThingSpeak..."

          DATA=""

          # -------------------------
          # RETRY LOGIC (3 попытки)
          # -------------------------
          for i in 1 2 3; do
            DATA=$(curl -s --max-time 15 -H "Accept: application/json" "$URL")
            
            echo "Attempt $i response length: ${#DATA}"

            echo "$DATA" | jq . >/dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "Valid JSON received"
              break
            fi

            echo "Invalid response, retry..."
            sleep 2
          done

          # -------------------------
          # SAFETY CHECK (НЕ ПАДАЕМ)
          # -------------------------
          echo "$DATA" | jq . >/dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "WARNING: ThingSpeak returned invalid data, skipping run"
            exit 0
          fi

          # -------------------------
          # PARSE DATA SAFELY
          # -------------------------
          LAST=$(echo "$DATA" | jq -r '.feeds[0].created_at // empty')

          if [ -z "$LAST" ]; then
            echo "No timestamp found, skipping"
            exit 0
          fi

          LAST_TS=$(date -d "$LAST" +%s 2>/dev/null || echo 0)
          NOW_TS=$(date +%s)

          if [ "$LAST_TS" -eq 0 ]; then
            echo "Bad timestamp parsing"
            exit 0
          fi

          DIFF=$((NOW_TS - LAST_TS))

          echo "Last update: $LAST"
          echo "Diff seconds: $DIFF"

          # -------------------------
          # STATE FILE
          # -------------------------
          STATE_FILE=".esp_state"

          if [ ! -f "$STATE_FILE" ]; then
            echo "online" > "$STATE_FILE"
          fi

          PREV=$(cat "$STATE_FILE")

          if [ "$DIFF" -gt 300 ]; then
            CURR="offline"
          else
            CURR="online"
          fi

          echo "Prev state: $PREV"
          echo "Curr state: $CURR"

          # -------------------------
          # NOTIFY ONLY ON CHANGE
          # -------------------------
          if [ "$PREV" != "$CURR" ]; then

            if [ "$CURR" = "offline" ]; then
              curl -s --max-time 10 \
                -H "Title: ESP Alert" \
                -d "🔴 ESP OFFLINE" \
                "$NTFY_URL"
            else
              curl -s --max-time 10 \
                -H "Title: ESP Alert" \
                -d "🟢 ESP ONLINE" \
                "$NTFY_URL"
            fi

            echo "$CURR" > "$STATE_FILE"

            git config user.name "github-actions"
            git config user.email "actions@github.com"

            git add "$STATE_FILE"
            git commit -m "ESP state: $CURR" || true
            git push || true

          else
            echo "No state change"
          fi
