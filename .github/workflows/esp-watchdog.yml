STATE_FILE=".esp_state"

# если файла нет — считаем что система была online
if [ ! -f "$STATE_FILE" ]; then
  echo "online" > "$STATE_FILE"
fi

PREV=$(cat "$STATE_FILE")

# определяем текущее состояние
if [ "$DIFF" -gt 300 ]; then
  CURR="offline"
else
  CURR="online"
fi

echo "Prev state: $PREV"
echo "Curr state: $CURR"

# -------------------------
# УВЕДОМЛЕНИЯ ТОЛЬКО ПРИ ИЗМЕНЕНИИ
# -------------------------

if [ "$CURR" != "$PREV" ]; then

  if [ "$CURR" = "offline" ]; then
    curl -s --max-time 10 \
      -H "Title: ESP Alert" \
      -d "🔴 ESP OFFLINE" \
      "$NTFY_URL"
  fi

  if [ "$CURR" = "online" ]; then
    curl -s --max-time 10 \
      -H "Title: ESP Alert" \
      -d "🟢 ESP ONLINE" \
      "$NTFY_URL"
  fi

else
  echo "No state change → no notification"
fi

# -------------------------
# ВСЕГДА ОБНОВЛЯЕМ STATE
# -------------------------
echo "$CURR" > "$STATE_FILE"
